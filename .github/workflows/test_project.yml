name: Run Project Tests
on: push

jobs:
    run_tests: #the name is upto you, it could be anything
        runs-on: ubuntu-latest
        steps:
            - name: Get code
            # USES: used to run a certain action, in this case we want to use the checkout action to get the code of the repository
              uses: actions/checkout@v6
            #   for configuration
            #   with:
                # ....
                # we could add WITH to specify certain branch or Repo, but we will use just the default which is the current branch
            - name: Install nodeJS
              uses: actions/setup-node@v6
            #   for configuration
              with:
                node-version: 24
            - name: Install dependencies
                # yarn install === yarn ci, but yarn ci is more safe and faster because it doesn't update the lock file and doesn't check for new versions of packages, it just installs the exact versions specified in the lock file
              run: yarn install --frozen-lockfile
            - name: Run tests
              run: yarn test

            #   SECOND JOB ACTION
    deployment_project: #the name is upto you, it could be anything
        runs-on: ubuntu-latest #every job have to have its own runner
        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: Install nodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 24
            - name: Install dependencies
              run: yarn install --frozen-lockfile
            - name: Deploy the project
              run: echo "Deploying the project..."