name: Run Project Tests
on: [push, workflow_dispatch] # this means that the workflow will run on every push to the repository and also it can be triggered manually from the Actions tab in the GitHub repository

jobs:
    run_lint:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            
            # add cache dependancies to speed up workflow
            - name: Load and Cache dependencies
              uses: ./.github/actions/cached-deps
              with:
                caching: 'false'
            # - name: Cache dependencies
            #   uses: actions/cache@v5
            #   with:
            #     path: ~/.cache/yarn
            #     key: deps-node-modules-${{hashFiles('**/yarn.lock')}}

            # - name: Install dependencies
            #   run: yarn install --frozen-lockfile

            - name: Run lint
              run: yarn lint

    run_tests: #the name is upto you, it could be anything
        runs-on: ubuntu-latest
        steps:
            - name: Get code
            # USES: used to run a certain action, in this case we want to use the checkout action to get the code of the repository
              uses: actions/checkout@v6
            #   for configuration
            #   with:
                # ....
            - name: Load and Cache dependencies
              uses: ./.github/actions/cached-deps

            - name: Run tests
              continue-on-error: true #this mean that step will not BLOCK others from running even if it failed
              id: run-tests
              run: yarn test

            - name: Make sure File exist
              run: ls -R

            - name: Upload test report
            #failure() && steps.run-tests.outcome == 'failure'
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: test-report-file
                path: test.json

            #   SECOND JOB ACTION
    deployment_project: #the name is upto you, it could be anything
        needs: run_tests #this make the second job (deployment_project) runs after the first job (run_tests) finished and successed
        runs-on: ubuntu-latest #every job have to have its own runner
        steps:
            - name: Get code
              uses: actions/checkout@v6

            - name: Load and Cache dependencies
              uses: ./.github/actions/cached-deps

            - name: Download Artifact
              uses: actions/download-artifact@v4
              with:
                #should be the same as the name of Upload Artifact at previos job
                name: test-report-file 
            
            - name: Print output content
              run : |
                  ls
                  cat test.json

            - name: Deploy the project
              run: echo "Deploying the project..."
    report:
      needs: [run_lint, deployment_project]
      #this job will run when any of previous jobs failed
      # must be persent as a MAIN uses of a JOB
      uses: ./.github/workflows/reusable.yml 
      with:
        artifact-name: test-report-file
      # if: failure() 
      # runs-on: ubuntu-latest
      # steps:
      #   - name: Print report information
      #     run: |
      #       echo "This is a report line step"
      #       echo "${{github}}"

    print-report-output:
      needs: report
      runs-on: ubuntu-latest
      steps:
        - name: Print the reusable workflow output message
          run: echo "OUTPUT ${{needs.report.outputs.result_message}}"