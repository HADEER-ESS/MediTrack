name: Reusable WorkFlow
on: 
    workflow_call: #this mean that this workflow can be called from other workflows
        inputs:
            artifact-name:
                description: 'The name of the artifact to download'
                required: true
                type: string
        outputs:
            result_message:
                description: "A message from reusable workflow as OUTPUT"
                value: ${{ jobs.execute_deployment.outputs.job_message_result}}
jobs:
    execute_deployment:
        outputs:
            job_message_result: ${{ steps.mess_output.outputs.reusable-step-result }}
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/download-artifact@v4
              with:
                name: ${{inputs.artifact-name}}
            - name: Print output content
              run : ls
            - name: Output message
              run: echo "This is a reusable workflow"
            - name: Create outputs value message
              id: mess_output
              run: echo "reusable-step-result=SUCCESS_MESS" >> $GITHUB_OUTPUT